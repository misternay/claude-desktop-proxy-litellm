name: Build Go Binary

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: |
          mkdir -p dist
          go build -o dist/proxy .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxy-linux-amd64
          path: dist/proxy
